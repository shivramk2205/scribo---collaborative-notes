# Server (Railway sets PORT automatically)
server.port=${PORT:8080}

# CORS — comma-separated frontend URLs
cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://scribo-seven.vercel.app,https://scribo-git-main-shivramk2205s-projects.vercel.app,https://scribo-4bvvhka4s-shivramk2205s-projects.vercel.app

# Scribo Database Configurations

# MySQL Configuration (Default as per project spec)
# spring.datasource.url=jdbc:mysql://localhost:3306/scribo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# H2 In-Memory Database Configuration (Comment out MySQL lines and uncomment below to run offline)
spring.datasource.url=jdbc:h2:mem:scribodb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA and Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configurations
jwt.secret=${JWT_SECRET:scribo_super_secret_key_change_in_production_with_lots_of_random_chars}
# 24 hours in milliseconds (86400000)
jwt.expiration=86400000
